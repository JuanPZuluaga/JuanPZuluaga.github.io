- id: graft
  short: "GRAFT"
  title: "GRAFT: Grafted Reference Audio for Fine-Grained Pronunciation in Zero-Shot TTS"
  venue: "arXiv"
  year: 2026
  authors: "A. Asonitis, F. Verdini, A. Farhadipour, V. Avijeet, P.-E. Honnet, M. Razavi, <strong>J. P. Zuluaga</strong>."
  arxiv: "https://arxiv.org/abs/2607.02633"
  tldr: "Among the first zero-shot TTS systems to give **per-word pronunciation control**: graft a short spoken hint of a tricky word, a rare name, loanword, or technical term, and GRAFT speaks the whole sentence in a cloned voice with that exact pronunciation."
  stats:
    - value: "22–39%"
      label: "lower target-word phoneme error rate"
    - value: "#1"
      label: "human eval on pronunciation accuracy"
    - value: "6"
      label: "languages (EN, FR, DE, ES, IT, …)"
  flow:
    title: "How it works"
    steps:
      - label: "Spoken hint"
        sub: "short audio of the word"
      - label: "Graft at word position"
        sub: "speech-token anchoring"
        highlight: true
      - label: "Voice conversion"
        sub: "hint voice ≠ target voice"
      - label: "Cloned-voice speech"
        sub: "correct pronunciation"
  takeaway: "Fixes a core failure of zero-shot TTS, mispronouncing rare names, loanwords, and technical terms, by letting anyone specify pronunciation with a quick audio example instead of phonemes."
  links:
    - name: project page
      url: "https://graft-tts.github.io/graft/"
    - name: arxiv
      url: "https://arxiv.org/abs/2607.02633"
    - name: samples
      url: "https://graft-tts.github.io/graft/"

