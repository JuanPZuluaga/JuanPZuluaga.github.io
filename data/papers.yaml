  venue: "Interspeech"
  year: 2023
  award: "Best Student Paper nominee"
  authors: "<strong>J. P. Zuluaga</strong>, S. Sarfjoo, A. Prasad, I. Nigmatulina, P. Motlicek, K. Ondrej, O. Ohneiser, H. Helmke."
  arxiv: "https://arxiv.org/abs/2305.18283"
  tldr: "A benchmark and open model for spoken-accent classification on Common Voice, reaching **95%+ accuracy** with self-supervised models."
  stats:
    - value: "95.1%"
      label: "accent-ID accuracy (English)"
    - value: "★"
      label: "Best Student Paper nominee"
    - value: "4"
      label: "languages benchmarked"
  flow:
    title: "How it works"
    steps:
      - label: "Speech utterance"
        sub: "Common Voice"
      - label: "Self-supervised encoder"
        sub: "wav2vec 2.0-XLSR"
        highlight: true
      - label: "Stat-pooling head"
        sub: "accent classifier"
      - label: "Accent label"
        sub: "95%+ accuracy"
  results:
    title: "Accent-ID accuracy on English Common Voice (higher is better)"
    unit: "%"
